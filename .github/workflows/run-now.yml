name: Run Now live

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: run-now-live
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure data branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git switch --orphan data
            mkdir -p data
            touch data/.gitkeep
            git add data/.gitkeep
            git commit -m "chore: bootstrap data branch"
            git push origin data
            git checkout main
          fi
          git fetch origin data:refs/remotes/origin/data
          git worktree add data-tree origin/data

      - name: Fetch Run Now live artifact
        env:
          WFM_USER_AGENT: "the-plat-exchange-run-now/0.1 (+https://github.com/${{ github.repository }})"
        run: npx tsx scripts/run-now-fetch.ts --data-dir data-tree/data

      - name: Commit and push live artifact
        run: |
          cd data-tree
          git add data/latest/run-now.json
          if git diff --cached --quiet; then
            echo "No Run Now live changes"
            exit 0
          fi
          git commit -m "data(run-now): $(date -u +%FT%TZ)"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:data; then
              exit 0
            fi
            git fetch origin data
            if ! git rebase --strategy-option=ours origin/data; then
              git rebase --abort || true
            fi
            sleep $((attempt * 3))
          done
          exit 1
