name: Sentiment fetch

on:
  schedule:
    - cron: "27 */6 * * *"
  workflow_dispatch:

concurrency:
  group: sentiment-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure data branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git switch --orphan data
            mkdir -p data
            touch data/.gitkeep
            git add data/.gitkeep
            git commit -m "chore: bootstrap data branch"
            git push origin data
            git checkout main
          fi
          git fetch origin data:refs/remotes/origin/data
          git worktree add data-tree origin/data

      - name: Fetch sentiment
        env:
          WFM_SENTIMENT_UA: "wf-riventrader-sentiment/0.1 (+https://github.com/${{ github.repository }})"
          WFM_CACHE_DIR: /tmp/wfm-cache
        run: npx tsx scripts/sentiment-fetch.ts --data-dir data-tree/data

      - name: Commit and push
        run: |
          cd data-tree
          git add data
          if git diff --cached --quiet; then
            echo "No new sentiment events"
            exit 0
          fi
          git commit -m "data(sentiment): $(date -u +%FT%TZ)"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:data; then
              exit 0
            fi
            git fetch origin data
            if ! git rebase --strategy-option=ours origin/data; then
              git rebase --abort || true
            fi
            sleep $((attempt * 3))
          done
          exit 1
